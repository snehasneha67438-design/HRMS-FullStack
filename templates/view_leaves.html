<!DOCTYPE html>
<html>
<head>
    <title>Employee List</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container">
    <h2>Leave Requests</h2>

    <table border="1">
        <tr>
            <th>Leave ID</th>
            <th>Employee Name</th>
            <th>Leave Type</th>
            <th>From</th>
            <th>To</th>
            <th>Status</th>
            <th>Action</th>
        </tr>

        {% for leave in leaves %}
        <tr>
            <td>{{ leave[0] }}</td>
            <td>{{ leave[2] }}</td>
            <td>{{ leave[3] }}</td>
            <td>{{ leave[4] }}</td>
            <td>{{ leave[5] }}</td>
            <td>{{ leave[7] }}</td>
            <td>
                <a href="/approve_leave/{{ leave[0] }}">Approve</a> |
                <a href="/reject_leave/{{ leave[0] }}">Reject</a>
            </td>
        </tr>
        {% endfor %}
    </table>
</div>
</body>
</html>
