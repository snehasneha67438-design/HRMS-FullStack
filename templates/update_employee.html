<!DOCTYPE html>
<html>
<head>
    <title>Employee List</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container">
    <h2>Update Employee</h2>

    <form action="/update_employee/{{ emp[0] }}" method="POST">
        Name: <input type="text" name="emp_name" value="{{ emp[1] }}"><br><br>
        Email: <input type="email" name="email" value="{{ emp[2] }}"><br><br>
        Phone: <input type="text" name="phone" value="{{ emp[3] }}"><br><br>

        <button type="submit">Update</button>
    </form>
</div>
</body>
</html>
